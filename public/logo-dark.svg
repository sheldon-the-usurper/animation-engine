<svg width="320" height="300" viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Softer, more natural gradients -->
    <linearGradient id="gLeftTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f4f6"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="gLeftBottom" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#4b5563"/>
    </linearGradient>
    <linearGradient id="gRightTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7df"/>
      <stop offset="100%" stop-color="#2aa39c"/>
    </linearGradient>
    <linearGradient id="gRightBottom" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2aa39c"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>

    <!-- Subtle center glow -->
    <linearGradient id="centerLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Geometry (tighter + centered) -->
  <!-- Top -->
  <polygon points="160,65 85,150 160,150" fill="url(#gLeftTop)"/>
  <polygon points="160,65 235,150 160,150" fill="url(#gRightTop)"/>

  <!-- Bottom -->
  <polygon points="160,235 85,150 160,150" fill="url(#gLeftBottom)"/>
  <polygon points="160,235 235,150 160,150" fill="url(#gRightBottom)"/>

  <!-- Center edge (subtle, not harsh black) -->
  <rect x="159" y="65" width="2" height="170" fill="url(#centerLine)"/>

  <!-- Text (better weight + spacing) -->
  <text x="50%" y="280" text-anchor="middle"
        font-size="38"
        font-weight="600"
        letter-spacing="0.5"
        font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif">
    <tspan fill="#f3f4f6">Euler</tspan><tspan fill="#2aa39c">Fold</tspan>
  </text>
</svg>
